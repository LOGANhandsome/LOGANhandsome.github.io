<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>김규민 소개</title>
    <link rel="icon" type="image/png" href="./kim.png" />

    <!-- 검색엔진 차단 -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        color: #f4f7ff;
        background:
          radial-gradient(circle at top left, rgba(90, 130, 255, 0.28), transparent 32%),
          radial-gradient(circle at bottom right, rgba(0, 220, 255, 0.2), transparent 28%),
          linear-gradient(135deg, #050816 0%, #0b1020 45%, #111935 100%);
        overflow-x: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .bg-lines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      }

      .wrap {
        width: min(980px, 100%);
        position: relative;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        padding: 38px 28px;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0.05)
        );
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow:
          0 20px 70px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(16px);
      }

      .hero::before {
        content: "";
        position: absolute;
        width: 240px;
        height: 240px;
        right: -70px;
        top: -70px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(123, 169, 255, 0.35), transparent 70%);
      }

      .hero::after {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        left: -60px;
        bottom: -60px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 255, 213, 0.18), transparent 70%);
      }

      .top-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(130, 170, 255, 0.14);
        border: 1px solid rgba(150, 190, 255, 0.25);
        color: #d9e7ff;
        font-size: 13px;
        letter-spacing: 0.06em;
        margin-bottom: 18px;
      }

      .title {
        position: relative;
        z-index: 1;
        margin: 0;
        font-size: clamp(38px, 8vw, 74px);
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .title .glow {
        display: block;
        background: linear-gradient(90deg, #ffffff, #9fd0ff, #8efff3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .sub {
        position: relative;
        z-index: 1;
        margin-top: 16px;
        font-size: 17px;
        color: #c4d3f6;
        line-height: 1.8;
      }

      .cards {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 30px;
      }

      .card {
        padding: 20px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow:
          0 18px 30px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .label {
        font-size: 13px;
        color: #95a8d6;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .value {
        font-size: 26px;
        font-weight: 800;
        color: #ffffff;
      }

      .value.small {
        font-size: 21px;
        line-height: 1.5;
      }

      .bottom-message {
        margin-top: 26px;
        padding: 18px 20px;
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          rgba(121, 167, 255, 0.15),
          rgba(142, 247, 255, 0.08)
        );
        border: 1px solid rgba(150, 190, 255, 0.14);
        color: #deebff;
        font-size: 15px;
        line-height: 1.8;
      }

      .accent {
        color: #8ef7ff;
        font-weight: 800;
      }

      @media (max-width: 820px) {
        .hero {
          padding: 28px 20px;
          border-radius: 24px;
        }

        .cards {
          grid-template-columns: 1fr;
        }

        .value {
          font-size: 22px;
        }

        .value.small {
          font-size: 18px;
        }

        .sub {
          font-size: 15px;
          line-height: 1.7;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-lines"></div>

    <div class="wrap">
      <section class="hero">
        <div class="top-tag">PERSONAL PROFILE</div>

        <h1 class="title">
          김규민
          <span class="glow">GYUMIN KIM</span>
        </h1>

        <p class="sub">
          조용히 있어도 존재감이 있고,<br />
          한 번 보면 기억에 남는 사람.
        </p>

        <div class="cards">
          <div class="card">
            <div class="label">CLASS</div>
            <div class="value">1-6 반장</div>
          </div>

          <div class="card">
            <div class="label">NUMBER</div>
            <div class="value">3번</div>
          </div>

          <div class="card">
            <div class="label">FAVORITE</div>
            <div class="value small">라면 좋아함</div>
          </div>
        </div>

        <div class="bottom-message">
          <span class="accent">김규민</span>은
          1-6의 반장이자 3번.<br />
          딱딱한 소개보다, 그냥 분위기로 기억되는 타입.<br />
          그리고 라면을 좋아한다는 건 꽤 중요한 정보다.
        </div>
      </section>
    </div>
  </body>
</html>
